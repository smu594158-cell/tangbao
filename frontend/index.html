<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 杭州旅游助手</title>
    <!-- 引入高德地图 JS API -->
    <script type="text/javascript">
      window._AMapSecurityConfig = {
        securityJsCode: '%VITE_AMAP_JSAPI_SECURITY_CODE%', // 从环境变量注入 Web端(JSAPI)安全密钥
      }
    </script>
    <!-- 此处的 key 必须是 "Web端(JSAPI)" 类型的 Key，不能与后端 Web服务的 Key 混用 -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=%VITE_AMAP_JSAPI_KEY%&plugin=AMap.Driving,AMap.Walking,AMap.Transfer,AMap.Bicycling,AMap.PlaceSearch,AMap.Geocoder"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
